{% extends 'master/base.html' %}

{% block content %}

  <div class="form-card glass-card">
    <h2 class="page-title" style="font-size:2rem; margin:0 0 18px;">Add Job Listing</h2>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="jobTitle">Category Name</label>
                <input type="text" class="form-control" name="category_title"  required>
            </div>
            <div class="form-group">
                <label for="companyName">Descriptoin</label>
                <input type="text" class="form-control" name="descriptoin"  required>
            </div>
            <div class="form-group">
                <label for="location">created_at</label>
                <input type="date" class="form-control" name="created_at" required>
            </div>
            <br>
      <button  class="btn btn-primary btn-sm">Submit</button>
    </form>
  </div>

{% endblock content %}
